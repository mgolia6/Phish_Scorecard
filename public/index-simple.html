<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishow Scorecard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #33ff33;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            border: 3px solid #33ff33;
            margin-top: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #33ff33;
            padding-bottom: 20px;
        }

        h1 {
            color: #ff6600;
            font-size: 2.5em;
            text-shadow: 0 0 10px #ff6600;
            margin-bottom: 10px;
        }

        .version {
            color: #00ffff;
            font-size: 0.8em;
        }

        .section {
            margin: 30px 0;
            padding: 20px;
            border: 2px solid #33ff33;
            background: #001a00;
        }

        .section h2 {
            color: #00ffff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input, select {
            background: #000;
            color: #33ff33;
            border: 2px solid #33ff33;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            margin: 10px 0;
            width: 100%;
            max-width: 400px;
        }

        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 10px #33ff33;
        }

        button {
            background: #33ff33;
            color: #000;
            border: 2px solid #33ff33;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            cursor: pointer;
            margin: 10px 5px 10px 0;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }

        button:active {
            transform: scale(0.98);
        }

        .results {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #33ff33;
            background: #000;
            max-height: 400px;
            overflow-y: auto;
        }

        .result-item {
            padding: 10px;
            margin: 5px 0;
            border-left: 3px solid #ff6600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-item:hover {
            background: #001a00;
            padding-left: 15px;
        }

        .show-details {
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #00ffff;
            background: #001a00;
        }

        .setlist {
            margin-top: 20px;
        }

        .set {
            margin: 15px 0;
            padding: 10px;
            border-left: 3px solid #ff6600;
        }

        .set-title {
            color: #ff6600;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .song {
            padding: 8px;
            margin: 5px 0;
            background: #000;
            border: 1px solid #33ff33;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .song-name {
            flex: 1;
        }

        .rating-input {
            width: 60px;
            margin-left: 10px;
        }

        .error {
            color: #ff3333;
            background: #330000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ff3333;
        }

        .success {
            color: #33ff33;
            background: #003300;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #33ff33;
        }

        .loading {
            color: #ffff00;
            font-style: italic;
        }

        .stats {
            margin-top: 20px;
            padding: 15px;
            background: #001a00;
            border: 2px solid #00ffff;
        }

        .stat-row {
            padding: 8px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #33ff33;
        }

        .stat-row:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Phishow Scorecard</h1>
            <span class="version">v2.0 - Direct API</span>
        </header>

        <!-- Search Section -->
        <div class="section">
            <h2>🔍 Search Shows</h2>
            <input type="text" id="searchInput" placeholder="Enter date (YYYY-MM-DD) or venue name..." />
            <button onclick="searchShows()">Search</button>
            <button onclick="loadRandomShow()">Random Show</button>
            <div id="searchResults" class="results"></div>
        </div>

        <!-- Show Details -->
        <div id="showDetails" class="section" style="display: none;">
            <h2>📍 Show Details</h2>
            <div id="showInfo"></div>
        </div>

        <!-- Setlist & Ratings -->
        <div id="setlistSection" class="section" style="display: none;">
            <h2>🎵 Rate This Show</h2>
            <div id="setlistContent"></div>
            <button onclick="submitRatings()">Submit Ratings</button>
        </div>

        <!-- Stats -->
        <div id="statsSection" class="section" style="display: none;">
            <h2>📊 Your Stats</h2>
            <div id="statsContent"></div>
        </div>

        <!-- Messages -->
        <div id="messages"></div>
    </div>

    <script>
        let currentShow = null;
        let ratings = {};

        // Fetch shows from Phish.net API
        async function fetchShows() {
            try {
                const response = await fetch('https://api.phish.net/v5/shows/artist/phish?limit=500');
                if (!response.ok) throw new Error('Failed to fetch shows');
                const data = await response.json();
                return data.data || [];
            } catch (error) {
                showMessage('Error fetching shows: ' + error.message, 'error');
                return [];
            }
        }

        // Search shows
        async function searchShows() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (!query) {
                showMessage('Please enter a search term', 'error');
                return;
            }

            showMessage('Searching...', 'loading');
            const shows = await fetchShows();
            
            const results = shows.filter(show =>
                show.showdate.includes(query) ||
                (show.venue && show.venue.toLowerCase().includes(query)) ||
                (show.city && show.city.toLowerCase().includes(query))
            ).slice(0, 20);

            if (results.length === 0) {
                showMessage('No shows found', 'error');
                document.getElementById('searchResults').innerHTML = '';
                return;
            }

            let html = '';
            results.forEach(show => {
                html += `
                    <div class="result-item" onclick="selectShow('${show.showdate}', '${show.venue}', '${show.city}', '${show.state}')">
                        <strong>${show.showdate}</strong> - ${show.venue}<br>
                        <small>${show.city}, ${show.state}</small>
                    </div>
                `;
            });

            document.getElementById('searchResults').innerHTML = html;
            showMessage(`Found ${results.length} shows`, 'success');
        }

        // Load random show
        async function loadRandomShow() {
            showMessage('Loading random show...', 'loading');
            const shows = await fetchShows();
            if (shows.length === 0) {
                showMessage('Could not load shows', 'error');
                return;
            }
            const randomShow = shows[Math.floor(Math.random() * shows.length)];
            selectShow(randomShow.showdate, randomShow.venue, randomShow.city, randomShow.state);
        }

        // Select a show
        async function selectShow(date, venue, city, state) {
            currentShow = { date, venue, city, state };
            ratings = {};

            // Show details
            document.getElementById('showDetails').style.display = 'block';
            document.getElementById('showInfo').innerHTML = `
                <p><strong>Date:</strong> ${date}</p>
                <p><strong>Venue:</strong> ${venue}</p>
                <p><strong>Location:</strong> ${city}, ${state}</p>
                <p><a href="https://phish.net" target="_blank">View on Phish.net →</a></p>
            `;

            // Fetch setlist
            showMessage('Loading setlist...', 'loading');
            try {
                const response = await fetch(`https://api.phish.net/v5/shows/${date}`);
                if (!response.ok) throw new Error('Show not found');
                
                const data = await response.json();
                const show = data.data;

                if (!show.setlist || show.setlist.length === 0) {
                    showMessage('No setlist found for this show', 'error');
                    return;
                }

                // Group by set
                const setsByName = {};
                show.setlist.forEach(song => {
                    const setName = song.set || 'I';
                    if (!setsByName[setName]) setsByName[setName] = [];
                    setsByName[setName].push(song);
                });

                // Display setlist
                let html = '';
                Object.keys(setsByName).forEach(setName => {
                    const setLabel = setName === 'E' ? 'Encore' : `Set ${setName}`;
                    html += `<div class="set"><div class="set-title">${setLabel}</div>`;
                    
                    setsByName[setName].forEach((song, idx) => {
                        html += `
                            <div class="song">
                                <span class="song-name">${song.song}</span>
                                <select class="rating-input" onchange="ratings['${setName}-${idx}'] = this.value">
                                    <option value="">Rate</option>
                                    <option value="5">5 ⭐</option>
                                    <option value="4">4</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                    <option value="1">1</option>
                                </select>
                            </div>
                        `;
                    });
                    html += '</div>';
                });

                document.getElementById('setlistContent').innerHTML = html;
                document.getElementById('setlistSection').style.display = 'block';
                showMessage('Setlist loaded!', 'success');
            } catch (error) {
                showMessage('Error loading setlist: ' + error.message, 'error');
            }
        }

        // Submit ratings
        function submitRatings() {
            const ratedCount = Object.values(ratings).filter(r => r).length;
            if (ratedCount === 0) {
                showMessage('Please rate at least one song', 'error');
                return;
            }

            // Save to localStorage
            const shows = JSON.parse(localStorage.getItem('ratedShows') || '[]');
            shows.push({
                date: currentShow.date,
                venue: currentShow.venue,
                city: currentShow.city,
                state: currentShow.state,
                ratings: ratings,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('ratedShows', JSON.stringify(shows));

            showMessage(`✓ Ratings saved! (${ratedCount} songs rated)`, 'success');
            loadStats();
        }

        // Load stats
        function loadStats() {
            const shows = JSON.parse(localStorage.getItem('ratedShows') || '[]');
            
            if (shows.length === 0) {
                document.getElementById('statsSection').style.display = 'none';
                return;
            }

            let html = `
                <div class="stat-row">
                    <span>Shows Rated:</span>
                    <strong>${shows.length}</strong>
                </div>
            `;

            shows.forEach((show, idx) => {
                const ratedCount = Object.values(show.ratings).filter(r => r).length;
                html += `
                    <div class="stat-row">
                        <span>${show.date} - ${show.venue}</span>
                        <strong>${ratedCount} songs</strong>
                    </div>
                `;
            });

            document.getElementById('statsContent').innerHTML = html;
            document.getElementById('statsSection').style.display = 'block';
        }

        // Show message
        function showMessage(text, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }

        // Initialize
        window.addEventListener('load', () => {
            loadStats();
            showMessage('Ready! Search for a show to get started.', 'success');
        });
    </script>
</body>
</html>
