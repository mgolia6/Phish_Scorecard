<svg width="100%" viewBox="0 0 480 90" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The Phreezer</title>
  <desc>The Phreezer wordmark with snowflake icon</desc>
  <g transform="translate(8, 8)">

    <!-- Snowflake: 6 main axes, sub-branches at 1/3 and 2/3, small tips -->
    <g transform="translate(34, 40)" stroke="#00E0D0" stroke-width="2" stroke-linecap="round" fill="none">

      <!-- 6 main spokes -->
      <line x1="0" y1="-30" x2="0" y2="30"/>
      <line x1="25.98" y1="-15" x2="-25.98" y2="15"/>
      <line x1="25.98" y1="15" x2="-25.98" y2="-15"/>

      <!-- Spoke 1 (top): branches at y=-20 and y=-10 -->
      <line x1="0" y1="-20" x2="-7" y2="-27"/>
      <line x1="0" y1="-20" x2="7" y2="-27"/>
      <line x1="0" y1="-10" x2="-5" y2="-15"/>
      <line x1="0" y1="-10" x2="5" y2="-15"/>

      <!-- Spoke 2 (bottom): branches at y=20 and y=10 -->
      <line x1="0" y1="20" x2="-7" y2="27"/>
      <line x1="0" y1="20" x2="7" y2="27"/>
      <line x1="0" y1="10" x2="-5" y2="15"/>
      <line x1="0" y1="10" x2="5" y2="15"/>

      <!-- Spoke 3 (upper-right): branches at 2/3 and 1/3 along -->
      <line x1="17.32" y1="-10" x2="21.32" y2="-17.93"/>
      <line x1="17.32" y1="-10" x2="24.32" y2="-5"/>
      <line x1="8.66" y1="-5" x2="12.66" y2="-11.93"/>
      <line x1="8.66" y1="-5" x2="14.66" y2="-1"/>

      <!-- Spoke 4 (lower-left): branches -->
      <line x1="-17.32" y1="10" x2="-21.32" y2="17.93"/>
      <line x1="-17.32" y1="10" x2="-24.32" y2="5"/>
      <line x1="-8.66" y1="5" x2="-12.66" y2="11.93"/>
      <line x1="-8.66" y1="5" x2="-14.66" y2="1"/>

      <!-- Spoke 5 (upper-left): branches -->
      <line x1="-17.32" y1="-10" x2="-21.32" y2="-17.93"/>
      <line x1="-17.32" y1="-10" x2="-24.32" y2="-5"/>
      <line x1="-8.66" y1="-5" x2="-12.66" y2="-11.93"/>
      <line x1="-8.66" y1="-5" x2="-14.66" y2="-1"/>

      <!-- Spoke 6 (lower-right): branches -->
      <line x1="17.32" y1="10" x2="21.32" y2="17.93"/>
      <line x1="17.32" y1="10" x2="24.32" y2="5"/>
      <line x1="8.66" y1="5" x2="12.66" y2="11.93"/>
      <line x1="8.66" y1="5" x2="14.66" y2="1"/>

      <!-- Center dot -->
      <circle cx="0" cy="0" r="3" fill="#00E0D0" stroke="none"/>
    </g>

    <text x="76" y="20" font-family="'Orbitron','Courier New',monospace" font-size="13" font-weight="700" fill="#00E0D0" letter-spacing="6">THE</text>
    <text x="74" y="62" font-family="'Orbitron','Courier New',monospace" font-size="42" font-weight="700" fill="#00E0D0" letter-spacing="3">PHREEZER</text>
  </g>
</svg>
