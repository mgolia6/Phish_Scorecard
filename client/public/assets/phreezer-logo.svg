<svg width="100%" viewBox="0 0 520 120" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The Phreezer</title>
  <desc>The Phreezer wordmark with snowflake icon and tagline FREEZE. RATE. RELIVE.</desc>
  <g transform="translate(10, 8)">

    <!-- Snowflake: 6 arms at 0/60/120/180/240/300 degrees, r=36, branches at r=20 -->
    <g transform="translate(40, 54)" stroke="#00E0D0" stroke-width="2.5" stroke-linecap="round" fill="none">
      <!-- Vertical arm -->
      <line x1="0" y1="-36" x2="0" y2="36"/>
      <!-- 60deg arm -->
      <line x1="31.2" y1="-18" x2="-31.2" y2="18"/>
      <!-- 120deg arm -->
      <line x1="31.2" y1="18" x2="-31.2" y2="-18"/>
      <!-- Branches on top arm -->
      <line x1="0" y1="-20" x2="-10" y2="-28"/>
      <line x1="0" y1="-20" x2="10" y2="-28"/>
      <!-- Branches on bottom arm -->
      <line x1="0" y1="20" x2="-10" y2="28"/>
      <line x1="0" y1="20" x2="10" y2="28"/>
      <!-- Branches on top-right arm -->
      <line x1="17.3" y1="-10" x2="23" y2="-22"/>
      <line x1="17.3" y1="-10" x2="27" y2="-4"/>
      <!-- Branches on bottom-left arm -->
      <line x1="-17.3" y1="10" x2="-23" y2="22"/>
      <line x1="-17.3" y1="10" x2="-27" y2="4"/>
      <!-- Branches on bottom-right arm -->
      <line x1="17.3" y1="10" x2="23" y2="22"/>
      <line x1="17.3" y1="10" x2="27" y2="4"/>
      <!-- Branches on top-left arm -->
      <line x1="-17.3" y1="-10" x2="-23" y2="-22"/>
      <line x1="-17.3" y1="-10" x2="-27" y2="-4"/>
      <circle cx="0" cy="0" r="3.5" fill="#00E0D0" stroke="none"/>
    </g>

    <text x="88" y="22" font-family="'Orbitron','Courier New',monospace" font-size="13" font-weight="700" fill="#00E0D0" letter-spacing="6">THE</text>
    <text x="86" y="64" font-family="'Orbitron','Courier New',monospace" font-size="40" font-weight="700" fill="#00E0D0" letter-spacing="3">PHREEZER</text>
    <line x1="86" y1="72" x2="498" y2="72" stroke="#00E0D0" stroke-width="1.5"/>
    <line x1="86" y1="92" x2="155" y2="92" stroke="#FF8A00" stroke-width="1.5"/>
    <text x="163" y="96" font-family="'Orbitron','Courier New',monospace" font-size="11" font-weight="700" fill="#FF8A00" letter-spacing="4">FREEZE . RATE . RELIVE.</text>
    <line x1="406" y1="92" x2="498" y2="92" stroke="#FF8A00" stroke-width="1.5"/>
  </g>
</svg>
